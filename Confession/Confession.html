<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Message For You ✨</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Georgia, serif;
      }

      body {
        min-height: 100vh;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;

        background: radial-gradient(
          circle at top,
          #5a77c8,
          #1f284d 60%,
          #10182d
        );
      }

      /* Stars */
      .stars {
        position: fixed;
        inset: 0;
        overflow: hidden;
        z-index: 0;
      }

      .star {
        position: absolute;
        width: 3px;
        height: 3px;
        background: white;
        border-radius: 50%;
        animation: twinkle 3s infinite ease-in-out;
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.2;
        }

        50% {
          opacity: 1;
        }
      }

      /* Container */
      .container {
        position: relative;
        z-index: 10;
        width: 100%;
        display: flex;
        justify-content: center;
      }

      /* Card */
      .card {
        width: min(95vw, 850px);
        max-height: 90vh;

        overflow-y: auto;

        backdrop-filter: blur(15px);
        background: rgba(255, 255, 255, 0.08);

        border: 1px solid rgba(255, 255, 255, 0.2);

        border-radius: 30px;

        padding: clamp(20px, 4vw, 40px);

        text-align: center;

        box-shadow: 0 0 40px rgba(255, 255, 255, 0.15);
      }

      .card::-webkit-scrollbar {
        width: 8px;
      }

      .card::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.25);
        border-radius: 20px;
      }

      /* Title */
      .title {
        color: white;

        font-size: clamp(1.8rem, 4vw, 2.5rem);

        margin-bottom: 20px;

        text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
      }

      /* Vision */
      .ornament {
        width: 90px;
        height: 90px;

        margin: auto;

        border-radius: 50%;

        border: 3px solid rgba(255, 255, 255, 0.7);

        display: flex;
        justify-content: center;
        align-items: center;

        color: white;

        font-size: 2rem;

        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        50% {
          transform: translateY(-10px);
        }
      }

      /* Button */
      button {
        margin-top: 25px;

        padding: 14px 32px;

        border: none;

        border-radius: 50px;

        font-size: 1rem;

        cursor: pointer;

        color: white;

        background: linear-gradient(135deg, #8eb7ff, #5d7cff);

        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
      }

      /* Letter */

      .letter {
        display: none;

        margin-top: 30px;

        text-align: center;

        color: white;

        line-height: 1.9;

        font-size: clamp(0.95rem, 2vw, 1.1rem);

        white-space: pre-wrap;

        word-wrap: break-word;
      }

      /* Glow */

      .glow {
        animation: glow 2s infinite alternate;
      }

      @keyframes glow {
        from {
          text-shadow: 0 0 10px white;
        }

        to {
          text-shadow: 0 0 25px #a7c4ff;
        }
      }

      /* Memory Gallery */

      .gallery {
        display: none;
        margin-top: 40px;
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .memory {
        opacity: 0;
        transform: translateY(20px);
        transition: all 1s ease;
      }

      .memory.show {
        opacity: 1;
        transform: translateY(0);
      }

      .memory img {
        width: min(260px, 80vw);
        border-radius: 20px;
        border: 2px solid rgba(255, 255, 255, 0.25);
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
      }

      .caption {
        color: white;
        margin-top: 8px;
        font-size: 0.95rem;
      }

      .final-memory img {
        width: min(380px, 90vw);
      }
    </style>
  </head>

  <body>
    <!-- MUSIC -->
    <audio id="bgm" loop>
      <source src="music/qingyun-peak.ogg" type="audio/ogg" />
    </audio>

    <div class="stars" id="stars"></div>

    <div class="container">
      <div class="card">
        <h1 class="title glow">Traveler...</h1>

        <div class="ornament">✦</div>

        <button onclick="openLetter()">Open Message</button>

        <div class="letter" id="letter"></div>

        <div class="gallery" id="gallery">
          <div class="memory" id="memory1">
            <img src="Images/1.png" alt="Drawing" />
            <div class="caption">The artist that brightens my days ✨</div>
          </div>

          <div class="memory" id="memory2">
            <img src="Images/3.png" alt="Flower" />
            <div class="caption">
              A flower is pretty, but not as pretty as you 🌸
            </div>
          </div>

          <div class="memory" id="memory3">
            <img src="Images/5.png" alt="Cooking" />
            <div class="caption">
              Every little thing you do feels special 🍳
            </div>
          </div>

          <div class="memory final-memory" id="memory4">
            <img src="Images/4.png" alt="Together" />
            <div class="caption">
              My favorite adventure is the one with you ✦
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Stars

      const stars = document.getElementById("stars");

      for (let i = 0; i < 150; i++) {
        const star = document.createElement("div");

        star.className = "star";

        star.style.left = Math.random() * 100 + "%";

        star.style.top = Math.random() * 100 + "%";

        star.style.animationDelay = Math.random() * 3 + "s";

        stars.appendChild(star);
      }

      // Message

      const message = `

Dear Traveler,


Among all the countless stars in the sky,
all the adventures and stories,
there is one person who quietly became
my favorite part of every day.


Like finding a precious chest after a long journey,
meeting you felt unexpected,
yet somehow exactly what I needed.


You make ordinary moments feel special.
You make difficult days easier.
And somehow, you always leave me smiling.


So today,
I wanted to tell you something honestly.


I like you.


Not because you're perfect,
but because being around you
makes everything feel brighter.


Whether this becomes the beginning
of a beautiful story
or simply a cherished memory,
I'm grateful that our paths crossed.


Thank you for being you.


✨

`;

      function openLetter() {
        // PLAY MUSIC

        const bgm = document.getElementById("bgm");

        bgm.play().catch((err) => {
          console.log("Music blocked:", err);
        });

        // LETTER

        const box = document.getElementById("letter");

        if (box.style.display === "block") return;

        box.style.display = "block";

        box.innerHTML = "";

        let i = 0;

        function typeWriter() {
          if (i < message.length) {
            box.innerHTML += message.charAt(i);

            i++;

            setTimeout(typeWriter, 20);
          } else {
            const gallery = document.getElementById("gallery");

            gallery.style.display = "flex";

            const memories = [
              document.getElementById("memory1"),
              document.getElementById("memory2"),
              document.getElementById("memory3"),
              document.getElementById("memory4"),
            ];

            memories.forEach((memory, index) => {
              setTimeout(() => {
                memory.classList.add("show");
              }, index * 1200);
            });
          }
        }

        typeWriter();
      }
    </script>
  </body>
</html>
